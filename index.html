<!DOCTYPE html>
<html lang="en-ZA">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tuckshop POS Pro</title>
    <link rel="icon" href="data:,">
    <!-- Use maintained Quagga2 fork – latest as of 2026 works better than original Quagga -->
    <script src="https://cdn.jsdelivr.net/npm/@ericblade/quagga2@1.8.4/dist/quagga.min.js"></script>
    <style>
        :root {
            --primary: #2563eb;
            --success: #16a34a;
            --danger: #dc2626;
            --bg: #f8fafc;
            --text: #1e293b;
            --gray: #64748b;
        }
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 12px;
            min-height: 100vh;
        }
        .container {
            max-width: 520px;
            margin: 0 auto;
            background: white;
            padding: 16px;
            border-radius: 16px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.08);
        }
        nav {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }
        nav button {
            flex: 1;
            padding: 12px;
            border: none;
            background: #e2e8f0;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
        }
        nav button.active {
            background: var(--primary);
            color: white;
        }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        #interactive.viewport {
            width: 100%;
            height: 260px;
            position: relative;
            overflow: hidden;
            border-radius: 12px;
            background: #000;
            margin: 12px 0;
            display: none;
        }
        #interactive.viewport > video, #interactive.viewport > canvas {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        input, select {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #cbd5e1;
            border-radius: 10px;
            font-size: 16px;
            margin-bottom: 12px;
        }
        .btn {
            width: 100%;
            padding: 14px;
            border-radius: 10px;
            border: none;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            margin-bottom: 12px;
            transition: opacity 0.2s;
        }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .btn-scan { background: var(--primary); color: white; }
        .btn-save { background: var(--success); color: white; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-gray { background: var(--gray); color: white; }
        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #f1f5f9;
        }
        #search-results {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            max-height: 220px;
            overflow-y: auto;
            z-index: 10;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            display: none;
        }
        .search-row {
            padding: 12px 16px;
            border-bottom: 1px solid #f1f5f9;
            cursor: pointer;
        }
        .search-row:hover { background: #f8fafc; }
        .markup-group {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }
        .markup-group label { flex: 0 0 90px; font-weight: 500; }
        .del-btn {
            background: none;
            border: none;
            color: var(--danger);
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            padding: 4px 8px;
        }
        .total-display {
            display: flex;
            justify-content: space-between;
            font-size: 24px;
            font-weight: 800;
            padding: 20px 0;
            border-top: 2px solid #e2e8f0;
        }
        .status-msg { color: var(--gray); font-size: 14px; margin: 8px 0; min-height: 1.4em; }
    </style>
</head>
<body>

<div class="container">
    <nav>
        <button id="nav-sale" class="active" onclick="showTab('sale')">Sale</button>
        <button id="nav-stock" onclick="showTab('stock')">Stock</button>
        <button id="nav-sets" onclick="showTab('sets')">⚙️ Settings</button>
    </nav>

    <div id="interactive" class="viewport"></div>
    <button id="stop-scan-btn" class="btn btn-danger" style="display:none;" onclick="stopScanner()">Close Camera</button>

    <div id="sale-tab" class="tab-content active">
        <button id="scan-sale-btn" class="btn btn-scan" onclick="startScanner('sale')">📷 Scan Item</button>
        <div style="position: relative;">
            <input type="text" id="manual-search" placeholder="🔍 Search name or barcode..." oninput="handleSearch(this.value)">
            <div id="search-results"></div>
        </div>
        <div id="cart">
            <div id="cart-items-list"></div>
            <div class="total-display">
                <span>Total</span>
                <span id="grand-total">R0.00</span>
            </div>
            <button id="checkout-btn" class="btn btn-save" onclick="checkout()">Complete Sale</button>
            <button class="btn btn-gray" onclick="clearCart()">Clear Cart</button>
        </div>
        <div id="sale-status" class="status-msg"></div>
    </div>

    <div id="stock-tab" class="tab-content">
        <h2>Receive New Stock</h2>
        <button id="scan-stock-btn" class="btn btn-scan" onclick="startScanner('stock')">📷 Scan Barcode</button>
        <input type="text" id="stock-barcode" placeholder="Barcode">
        <input type="text" id="stock-name" placeholder="Item Name">
        <input type="number" step="0.01" id="stock-cost" placeholder="Cost Price (R)">
        <select id="stock-cat">
            <option value="Snacks">Snacks</option>
            <option value="Drinks">Drinks</option>
            <option value="Other">Other</option>
        </select>
        <button id="save-stock-btn" class="btn btn-save" onclick="saveStockToCloud()">Save Item</button>
        <div id="stock-status" class="status-msg"></div>
    </div>

    <div id="sets-tab" class="tab-content">
        <h2>Settings</h2>
        <label>Google Apps Script Web App URL:</label>
        <input type="text" id="sheet-url" placeholder="https://script.google.com/macros/s/.../exec">
        
        <h3>Category Selling Markup (%)</h3>
        <div class="markup-group"><label>Snacks:</label><input type="number" id="markup-Snacks" value="20" min="0"></div>
        <div class="markup-group"><label>Drinks:</label><input type="number" id="markup-Drinks" value="15" min="0"></div>
        <div class="markup-group"><label>Other:</label><input type="number" id="markup-Other" value="10" min="0"></div>
        
        <button class="btn" style="background:#334155; color:white" onclick="saveSettings()">Save Settings</button>
    </div>
</div>

<script>
    let inventory = [];
    let cart = [];
    let isScannerRunning = false;
    let currentScanMode = null;

    const elements = {
        manualSearch: document.getElementById('manual-search'),
        searchResults: document.getElementById('search-results'),
        cartList: document.getElementById('cart-items-list'),
        grandTotal: document.getElementById('grand-total'),
        scanSaleBtn: document.getElementById('scan-sale-btn'),
        checkoutBtn: document.getElementById('checkout-btn'),
        saveStockBtn: document.getElementById('save-stock-btn'),
        saleStatus: document.getElementById('sale-status'),
        stockStatus: document.getElementById('stock-status')
    };

    window.onload = () => {
        loadSettings();
        fetchInventory();
        renderCart();
    };

    function showTab(tab) {
        if (isScannerRunning) stopScanner();
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        document.getElementById(`${tab}-tab`).classList.add('active');
        document.getElementById(`nav-${tab}`).classList.add('active');
    }

    async function startScanner(mode) {
        if (typeof Quagga === 'undefined') {
            alert("Scanner library failed to load. Check internet.");
            return;
        }
        currentScanMode = mode;
        try {
            await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            const viewport = document.getElementById('interactive');
            viewport.style.display = 'block';
            document.getElementById('stop-scan-btn').style.display = 'block';
            isScannerRunning = true;

            Quagga.init({
                inputStream: {
                    name: "Live",
                    type: "LiveStream",
                    target: viewport,
                    constraints: {
                        facingMode: "environment",
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    }
                },
                locator: { patchSize: "medium", halfSample: true },
                numOfWorkers: navigator.hardwareConcurrency ? Math.min(4, navigator.hardwareConcurrency) : 2,
                decoder: { readers: ["ean_reader", "code_128_reader", "upc_reader", "code_39_reader"] },
                locate: true
            }, err => {
                if (err) {
                    alert("Scanner init failed: " + err);
                    stopScanner();
                    return;
                }
                Quagga.start();
            });

            Quagga.onDetected(data => {
                const code = data.codeResult.code;
                if (navigator.vibrate) navigator.vibrate(80);
                if (mode === 'sale') {
                    addToCart(code);
                    elements.saleStatus.textContent = `Scanned: ${code}`;
                } else {
                    document.getElementById('stock-barcode').value = code;
                    elements.stockStatus.textContent = `Barcode captured: ${code}`;
                }
                stopScanner();
            });
        } catch (e) {
            alert("Camera access denied or unavailable.\nCheck permissions.");
            stopScanner();
        }
    }

    function stopScanner() {
        if (Quagga && isScannerRunning) Quagga.stop();
        document.getElementById('interactive').style.display = 'none';
        document.getElementById('stop-scan-btn').style.display = 'none';
        isScannerRunning = false;
        currentScanMode = null;
    }

    function handleSearch(val) {
        if (val.length < 2) {
            elements.searchResults.style.display = 'none';
            return;
        }
        const lowerVal = val.toLowerCase();
        const filtered = inventory.filter(i => 
            (i.name && i.name.toLowerCase().includes(lowerVal)) ||
            (i.barcode && String(i.barcode).includes(val))
        );
        elements.searchResults.innerHTML = filtered.map(i => `
            <div class="search-row" onclick="addToCart('${String(i.barcode)}')">
                ${i.name} – R${getPrice(i)}
            </div>
        `).join('');
        elements.searchResults.style.display = filtered.length ? 'block' : 'none';
    }

    function getPrice(item) {
        const cat = item.category || 'Other';
        const markupPct = parseFloat(localStorage.getItem(`markup-${cat}`)) || 20;
        const cost = Number(item.cost) || 0;
        return (cost * (1 + markupPct / 100)).toFixed(2);
    }

    function addToCart(barcodeStr) {
        const barcode = String(barcodeStr);
        const item = inventory.find(i => String(i.barcode) === barcode);
        if (!item) {
            alert("Item not found in inventory.");
            return;
        }
        const existing = cart.find(c => String(c.barcode) === barcode);
        if (existing) existing.qty++;
        else cart.push({ ...item, qty: 1, price: getPrice(item) });
        
        elements.manualSearch.value = '';
        elements.searchResults.style.display = 'none';
        renderCart();
    }

    function renderCart() {
        elements.cartList.innerHTML = cart.map((item, idx) => `
            <div class="cart-item">
                <span><b>${item.name}</b> × ${item.qty}</span>
                <span>R${(Number(item.price) * item.qty).toFixed(2)}
                    <button class="del-btn" onclick="removeFromCart(${idx})">✕</button>
                </span>
            </div>
        `).join('');

        const total = cart.reduce((sum, i) => sum + (Number(i.price) * i.qty), 0);
        elements.grandTotal.textContent = `R${total.toFixed(2)}`;
        elements.checkoutBtn.disabled = cart.length === 0;
    }

    function removeFromCart(idx) {
        cart.splice(idx, 1);
        renderCart();
    }

    function clearCart() {
        if (confirm("Clear entire cart?")) {
            cart = [];
            renderCart();
        }
    }

    function checkout() {
        if (!cart.length) return;
        const total = elements.grandTotal.textContent;
        alert(`Sale completed!\nTotal: ${total}\nThank you!`);
        // Later: send cart to Google Sheet here
        clearCart();
    }

    function saveSettings() {
        localStorage.setItem('sheet-url', document.getElementById('sheet-url').value.trim());
        ['Snacks', 'Drinks', 'Other'].forEach(cat => {
            const val = document.getElementById(`markup-${cat}`).value;
            localStorage.setItem(`markup-${cat}`, val || '20');
        });
        alert("Settings saved!");
        fetchInventory();
    }

    function loadSettings() {
        document.getElementById('sheet-url').value = localStorage.getItem('sheet-url') || '';
        ['Snacks', 'Drinks', 'Other'].forEach(cat => {
            const val = localStorage.getItem(`markup-${cat}`);
            document.getElementById(`markup-${cat}`).value = val || (cat === 'Snacks' ? 20 : cat === 'Drinks' ? 15 : 10);
        });
    }

    async function fetchInventory() {
        const url = localStorage.getItem('sheet-url');
        if (!url) return;
        try {
            const res = await fetch(url);
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const data = await res.json();
            inventory = data.map(i => ({ ...i, barcode: String(i.barcode || '') }));
            elements.saleStatus.textContent = `Inventory loaded (${inventory.length} items)`;
        } catch (e) {
            console.error(e);
            elements.saleStatus.textContent = "Failed to load inventory";
        }
    }

    async function saveStockToCloud() {
        const url = localStorage.getItem('sheet-url');
        if (!url) return alert("Please set Google Apps Script URL in Settings first.");

        const name = document.getElementById('stock-name').value.trim();
        const barcode = document.getElementById('stock-barcode').value.trim();
        const cost = document.getElementById('stock-cost').value;
        const category = document.getElementById('stock-cat').value;

        if (!name || !barcode || !cost) {
            alert("Please fill in name, barcode and cost.");
            return;
        }

        elements.saveStockBtn.disabled = true;
        elements.stockStatus.textContent = "Saving...";

        try {
            const payload = JSON.stringify({ name, barcode, cost, category });
            const res = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' }, // avoids OPTIONS preflight
                body: payload
            });
            // GAS often returns 200 even on success with no-cors-like behavior
            alert("Item saved successfully!");
            fetchInventory(); // refresh list
            // clear form
            document.getElementById('stock-name').value = '';
            document.getElementById('stock-barcode').value = '';
            document.getElementById('stock-cost').value = '';
        } catch (e) {
            console.error(e);
            alert("Save failed – check URL & script permissions.");
        } finally {
            elements.saveStockBtn.disabled = false;
            elements.stockStatus.textContent = "";
        }
    }
</script>
</body>
</html>
