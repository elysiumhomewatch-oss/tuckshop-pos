<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Markup POS</title>
    <script src="https://unpkg.com"></script>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        nav { display: flex; gap: 5px; margin-bottom: 20px; }
        nav button { flex: 1; padding: 12px; cursor: pointer; border: none; background: #007bff; color: white; border-radius: 4px; }
        .tab-content { display: none; }
        .active { display: block; }
        input, select { width: 100%; padding: 10px; margin-top: 5px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        #reader { width: 100%; max-width: 400px; margin: auto; border: 2px solid #007bff; }
        .markup-row { display: flex; gap: 10px; align-items: center; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <nav>
        <button onclick="showTab('cashpoint')">Cashpoint</button>
        <button onclick="showTab('stock')">Stock In</button>
        <button onclick="showTab('settings')">Settings</button>
    </nav>

    <!-- Cashpoint -->
    <div id="cashpoint" class="tab-content active">
    <h2>Cashpoint</h2>
    <div id="reader"></div>
    <div style="margin-top:10px; display:flex; gap:5px;">
        <input type="text" id="manualBarcode" placeholder="Enter Barcode manually">
        <button onclick="addToCart(document.getElementById('manualBarcode').value)" style="padding:10px; background:#007bff; color:white; border:none; border-radius:4px;">Add</button>
    </div>
    
    <div id="cart">
        <h3>Current Sale</h3>
        <table id="cart-table">
            <thead>
                <tr><th>Item</th><th>Qty</th><th>Price (Each)</th><th>Subtotal</th><th>Action</th></tr>
            </thead>
            <tbody id="cart-items"></tbody>
        </table>
        <h3 style="text-align:right;">Total: R<span id="total-price">0.00</span></h3>
        <button onclick="checkout()" style="width:100%; background:green; color:white; padding:15px; border:none; border-radius:5px; font-size:1.2rem; cursor:pointer;">Finish Sale & Print</button>
    </div>
</div>

    <!-- Stock -->
    <div id="stock" class="tab-content">
        <h2>Add Stock (Wholesale)</h2>
        <input type="text" id="itemName" placeholder="Item Name">
        <input type="number" id="itemCost" placeholder="Cost Price (Wholesale)">
        <input type="text" id="itemBarcode" placeholder="Scan/Type Barcode">
        <select id="itemCategory">
            <option value="Snacks">Snacks</option>
            <option value="Drinks">Drinks</option>
            <option value="Other">Other</option>
        </select>
        <button onclick="syncToSheet()" style="background:#28a745; color:white; padding:10px; width:100%; border:none;">Add to Sheet</button>
    </div>

    <!-- Settings -->
    <div id="settings" class="tab-content">
        <h2>Pricing Settings</h2>
        <input type="text" id="scriptUrl" placeholder="Google Script URL">
        
        <h3>Category Markups (%)</h3>
        <div class="markup-row">
            <label>Snacks:</label>
            <input type="number" id="markup_Snacks" value="20">
        </div>
        <div class="markup-row">
            <label>Drinks:</label>
            <input type="number" id="markup_Drinks" value="15">
        </div>
        <div class="markup-row">
            <label>Other:</label>
            <input type="number" id="markup_Other" value="10">
        </div>
        <button onclick="saveSettings()" style="background:#333; color:white; padding:10px; width:100%; border:none;">Save Settings</button>
    </div>
</div>

<script>
    

    let inventory = [];
    let cart = JSON.parse(localStorage.getItem('tuckshop_cart')) || []; // Persistent cart
    let scanner = null;

    // Load saved settings
    document.getElementById('scriptUrl').value = localStorage.getItem('google_script_url') || '';
    ['Snacks', 'Drinks', 'Other'].forEach(cat => {
        const saved = localStorage.getItem('markup_' + cat);
        if (saved) document.getElementById('markup_' + cat).value = saved;
    });

    function showTab(id) {
        document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if (id === 'cashpoint') startScanner();
        else if (scanner) scanner.stop();
    }

    function saveSettings() {
        localStorage.setItem('google_script_url', document.getElementById('scriptUrl').value);
        ['Snacks', 'Drinks', 'Other'].forEach(cat => {
            localStorage.setItem('markup_' + cat, document.getElementById('markup_' + cat).value);
        });
        alert("Settings Saved!");
        loadFromSheet();
    }

    async function loadFromSheet() {
        const url = localStorage.getItem('google_script_url');
        if (!url) return;
        try {
            const response = await fetch(url);
            inventory = await response.json();
        } catch (e) { console.error(e); }
    }

    async function syncToSheet() {
        const url = localStorage.getItem('google_script_url');
        const item = {
            name: document.getElementById('itemName').value,
            cost: document.getElementById('itemCost').value,
            barcode: document.getElementById('itemBarcode').value,
            category: document.getElementById('itemCategory').value
        };
        await fetch(url, { method: 'POST', mode: 'no-cors', body: JSON.stringify(item) });
        alert("Saved!");
        loadFromSheet();
    }

   function addToCart(barcode) {
        const item = inventory.find(i => i.barcode == barcode);
        if (!item) {
            alert("Item not found in stock!");
            return;
        }

        // Get markup for this category
        const markupPercent = parseFloat(localStorage.getItem('markup_' + item.category) || 0);
        const sellingPrice = parseFloat(item.cost) * (1 + (markupPercent / 100));

        // Check if already in cart
        const existingItem = cart.find(c => c.barcode === barcode);
        if (existingItem) {
            existingItem.qty += 1;
        } else {
            cart.push({
                name: item.name,
                barcode: item.barcode,
                price: sellingPrice,
                qty: 1
            });
        }

        saveCart();
        updateCartUI();
        document.getElementById('manualBarcode').value = ''; // Clear manual input
    }

    function removeFromCart(index) {
        cart.splice(index, 1);
        saveCart();
        updateCartUI();
    }

    function saveCart() {
        localStorage.setItem('tuckshop_cart', JSON.stringify(cart));
    }

    function updateCartUI() {
        const tbody = document.getElementById('cart-items');
        tbody.innerHTML = cart.map((item, index) => `
            <tr>
                <td>${item.name}</td>
                <td>${item.qty}</td>
                <td>R${item.price.toFixed(2)}</td>
                <td>R${(item.price * item.qty).toFixed(2)}</td>
                <td><button onclick="removeFromCart(${index})" style="background:red; color:white; border:none; border-radius:3px;">X</button></td>
            </tr>
        `).join('');

        const total = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
        document.getElementById('total-price').innerText = total.toFixed(2);
    }

    function checkout() {
        if (cart.length === 0) return alert("Cart is empty!");
        
        const total = document.getElementById('total-price').innerText;
        alert("Sale Processed! Total: R" + total);
        
        // Optional: Send "Sale" data to a different Google Sheet tab here
        
        cart = [];
        saveCart();
        updateCartUI();
    }

    // --- Scanner Logic ---
    function startScanner() {
        if (!scanner) {
            scanner = new Html5Qrcode("reader");
        }
        // Start scanner if not already running
        scanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, 
            (decodedText) => {
                // Throttle: Don't add same barcode 10 times a second
                addToCart(decodedText);
                scanner.pause(); // Pause for 1 second to avoid double-scans
                setTimeout(() => scanner.resume(), 1500);
            }
        ).catch(err => console.error("Scanner failed", err));
    }

    // Initialize UI
    updateCartUI();
    loadFromSheet(); // From previous implementation
</script>
</body>
</html>
